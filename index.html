<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTEMIS Data Collection Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px; line-height: 1.6; background: #f5f5f3; color: #1a1a18;
      min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem;
    }
    @media (prefers-color-scheme: dark) { body { background: #1a1a18; color: #f0ede8; } }
    .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 16px; padding: 2rem; width: 100%; max-width: 620px; }
    @media (prefers-color-scheme: dark) { .card { background: #2c2c2a; border-color: rgba(255,255,255,0.1); } }
    .header { margin-bottom: 1.5rem; }
    .header h1 { font-size: 20px; font-weight: 500; margin-bottom: .4rem; }
    .header p { font-size: 13px; color: #5f5e5a; line-height: 1.5; }
    @media (prefers-color-scheme: dark) { .header p { color: #888780; } }
    .section-label { font-size: 11px; font-weight: 500; color: #888780; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .75rem; }
    .section { margin-bottom: 1.5rem; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: .9rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 13px; font-weight: 500; color: #1a1a18; }
    @media (prefers-color-scheme: dark) { .field label { color: #f0ede8; } }
    .field .hint { font-size: 12px; color: #888780; }
    input[type="text"], input[type="email"] {
      width: 100%; padding: 8px 10px; font-size: 14px; border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px; background: #fff; color: #1a1a18; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: rgba(0,0,0,0.4); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
    @media (prefers-color-scheme: dark) {
      input[type="text"], input[type="email"] { background: #1a1a18; color: #f0ede8; border-color: rgba(255,255,255,0.15); }
      input:focus { border-color: rgba(255,255,255,0.35); box-shadow: 0 0 0 3px rgba(255,255,255,0.06); }
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
    .drop-zone { border: 1.5px dashed rgba(0,0,0,0.2); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; background: #f9f8f5; transition: background .15s; }
    .drop-zone:hover, .drop-zone.drag-over { background: #f1efe8; }
    .drop-zone i { font-size: 28px; color: #b4b2a9; display: block; margin-bottom: .5rem; }
    .drop-zone p { font-size: 13px; color: #888780; }
    .drop-zone .browse { color: #185fa5; text-decoration: underline; cursor: pointer; }
    @media (prefers-color-scheme: dark) {
      .drop-zone { background: #222220; border-color: rgba(255,255,255,0.15); }
      .drop-zone:hover, .drop-zone.drag-over { background: #2a2a28; }
      .drop-zone .browse { color: #85b7eb; }
    }
    .file-list { margin-top: .75rem; display: flex; flex-direction: column; gap: 6px; }
    .file-chip { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; background: #fff; font-size: 13px; }
    @media (prefers-color-scheme: dark) { .file-chip { background: #2c2c2a; border-color: rgba(255,255,255,0.1); } }
    .file-chip .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-chip .fsize { font-size: 12px; color: #888780; }
    .file-chip .status-icon { font-size: 14px; flex-shrink: 0; }
    .file-chip .remove-btn { background: none; border: none; cursor: pointer; color: #888780; padding: 2px; display: flex; align-items: center; line-height: 1; }
    .file-chip .remove-btn:hover { color: #a32d2d; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .badge-json { background: #E6F1FB; color: #0C447C; }
    .badge-xml  { background: #E1F5EE; color: #085041; }
    .badge-ttl  { background: #FAEEDA; color: #633806; }
    .badge-unk  { background: #F1EFE8; color: #444441; }
    .divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.1); margin: 1.25rem 0; }
    @media (prefers-color-scheme: dark) { .divider { border-top-color: rgba(255,255,255,0.08); } }
    .status-box { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: .75rem; display: none; line-height: 1.5; }
    .status-ok   { background: #eaf3de; color: #3b6d11; border: 0.5px solid #97c459; }
    .status-err  { background: #fcebeb; color: #a32d2d; border: 0.5px solid #f09595; }
    .status-load { background: #f1efe8; color: #5f5e5a; border: 0.5px solid #d3d1c7; }
    .submit-btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 500; border-radius: 10px; background: #1a1a18; border: none; cursor: pointer; color: #f0ede8; transition: background .15s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .submit-btn:hover { background: #2c2c2a; }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    @media (prefers-color-scheme: dark) { .submit-btn { background: #f0ede8; color: #1a1a18; } .submit-btn:hover { background: #d3d1c7; } }
    .progress-bar-wrap { height: 4px; background: rgba(0,0,0,0.08); border-radius: 4px; margin-top: 8px; display: none; overflow: hidden; }
    .progress-bar { height: 100%; background: #3b6d11; border-radius: 4px; transition: width .3s; width: 0%; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>ARTEMIS Data Collection</h1>
    <p>Upload the data you want to add to the ARTEMIS Knowledge Base. Files will be stored in the ARTEMIS GitHub repository for review before ingestion. Accepted formats: <code>.json</code>, <code>.xml</code>, <code>.ttl</code>.</p>
  </div>

  <div class="section">
    <div class="section-label">Files</div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-file-upload"></i>
      <p>Drag files here or <span class="browse">browse</span></p>
      <p style="margin-top:4px;font-size:11px">.json · .xml · .ttl</p>
    </div>
    <input type="file" id="file-input" multiple accept=".json,.xml,.ttl" style="display:none">
    <div class="file-list" id="file-list"></div>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-label">Responsible person</div>
    <div class="two-col">
      <div class="field">
        <label for="partner-name">ARTEMIS partner / responsible person</label>
        <input type="text" id="partner-name" placeholder="Full name">
      </div>
      <div class="field">
        <label for="partner-email">E-mail</label>
        <input type="email" id="partner-email" placeholder="name@institution.eu">
      </div>
    </div>
  </div>

  <div id="status-box" class="status-box"></div>
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">
    <i class="ti ti-brand-github"></i> Upload to GitHub
  </button>
</div>

<script>
  // ── CONFIGURATION ──────────────────────────────────────────────
  const GITHUB_TOKEN  = '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';
  const GITHUB_OWNER  = 'lauratonti';
  const GITHUB_REPO   = 'artemis-form';
  const GITHUB_FOLDER = 'incoming';
  // ───────────────────────────────────────────────────────────────

  let selectedFiles = [];

  function extBadge(name) {
    const ext = name.split('.').pop().toLowerCase();
    const cls = {json:'badge-json', xml:'badge-xml', ttl:'badge-ttl'}[ext] || 'badge-unk';
    return `<span class="badge ${cls}">.${ext}</span>`;
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function renderFileList() {
    document.getElementById('file-list').innerHTML = selectedFiles.map((f, i) => `
      <div class="file-chip" id="chip-${i}">
        ${extBadge(f.name)}
        <span class="fname">${f.name}</span>
        <span class="fsize">${formatSize(f.size)}</span>
        <span class="status-icon" id="status-${i}"></span>
        <button class="remove-btn" onclick="removeFile(${i})" aria-label="Remove ${f.name}">
          <i class="ti ti-x" style="font-size:14px"></i>
        </button>
      </div>
    `).join('');
  }

  function removeFile(i) { selectedFiles.splice(i, 1); renderFileList(); }

  document.getElementById('file-input').addEventListener('change', e => {
    selectedFiles.push(...Array.from(e.target.files).filter(f => /\.(json|xml|ttl)$/i.test(f.name)));
    renderFileList(); e.target.value = '';
  });

  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    selectedFiles.push(...Array.from(e.dataTransfer.files).filter(f => /\.(json|xml|ttl)$/i.test(f.name)));
    renderFileList();
  });

  function showStatus(msg, type) {
    const box = document.getElementById('status-box');
    box.textContent = msg;
    box.className = 'status-box status-' + type;
    box.style.display = 'block';
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadToGitHub(file, base64Content, partner, email) {
    // Build path: incoming/YYYY-MM-DD_partnername/filename
    const date = new Date().toISOString().slice(0, 10);
    const safeName = partner.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase() || 'unknown';
    const path = `${GITHUB_FOLDER}/${date}_${safeName}/${file.name}`;

    // Check if file already exists (to get SHA for update)
    let sha = null;
    try {
      const check = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
        headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' }
      });
      if (check.ok) { const data = await check.json(); sha = data.sha; }
    } catch(e) {}

    const body = {
      message: `Upload ${file.name} — ${partner} <${email}>`,
      content: base64Content,
      ...(sha ? { sha } : {})
    };

    const r = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${GITHUB_TOKEN}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.message || 'GitHub API error');
    }
    return path;
  }

  async function submitForm() {
    if (!selectedFiles.length) { showStatus('Please select at least one file.', 'err'); return; }
    const partner = document.getElementById('partner-name').value.trim();
    const email   = document.getElementById('partner-email').value.trim();
    if (!partner) { showStatus('Please enter the responsible person name.', 'err'); return; }
    if (!email)   { showStatus('Please enter the responsible person e-mail.', 'err'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    showStatus(`Uploading ${selectedFiles.length} file(s) to GitHub…`, 'load');

    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';

    let uploaded = 0;
    const errors = [];

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      const statusEl = document.getElementById(`status-${i}`);
      try {
        const base64 = await fileToBase64(file);
        await uploadToGitHub(file, base64, partner, email);
        if (statusEl) statusEl.textContent = '✓';
        uploaded++;
      } catch(e) {
        if (statusEl) statusEl.textContent = '✗';
        errors.push(`${file.name}: ${e.message}`);
      }
      progressBar.style.width = ((i + 1) / selectedFiles.length * 100) + '%';
    }

    btn.disabled = false;

    if (errors.length === 0) {
      showStatus(`✓ All ${uploaded} file(s) uploaded successfully to GitHub (incoming/ folder). The ARTEMIS team will review them before ingestion.`, 'ok');
      selectedFiles = [];
      renderFileList();
      progressWrap.style.display = 'none';
    } else if (uploaded > 0) {
      showStatus(`${uploaded} file(s) uploaded. ${errors.length} failed: ${errors.join('; ')}`, 'err');
    } else {
      showStatus('Upload failed: ' + errors.join('; '), 'err');
    }
  }
</script>
</body>
</html>
